<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- Title & Branding -->
    <title>
      Eagle Eyes Built - Quality Construction Services in New Zealand
    </title>

    <!-- Meta Description (SEO) -->
    <meta
      name="description"
      content="Eagle Eyes Built specializes in high-quality construction, architecture, roofing, waterproofing, tiling, and residential building services across New Zealand."
    />
    <meta
      name="keywords"
      content="construction, residential building, waterproofing, roofing, tiling, Eagle Eyes Built, Auckland, New Zealand"
    />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Social Sharing) -->
    <meta
      property="og:title"
      content="Eagle Eyes Built - Quality Construction Services"
    />
    <meta
      property="og:description"
      content="Transforming your vision into reality with expert construction services in New Zealand."
    />
    <meta
      property="og:image"
      content="https://eagleeyesbuilt.co.nz/og-image.jpg"
    />
    <meta property="og:url" content="https://eagleeyesbuilt.co.nz" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Favicon & Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#262626" />
    <!-- Adjust to match the brand color -->

    <!-- Preconnect & Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Fonts (Montserrat & Poppins) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Preload main styles -->
    <link rel="stylesheet" href="/src/main.css" />

    <!-- Preload JavaScript -->
    <link rel="preload" href="/src/main.tsx" as="script" />
  </head>

  <body>
    <div id="root"></div>

    <!-- Main JavaScript Entry -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- Google Analytics (Optional) -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=YOUR_TRACKING_ID"></script> -->
  </body>
</html>
